server {
    server_name wesley.thesisko.com;

    # Blog static files
    location / {
        root /home/jarvis/blog/public;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Dead Drop — secret sharing service
    location /drop {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;

        # Security: limit body size (secrets max 64KB + overhead)
        client_max_body_size 128k;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wesley.thesisko.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wesley.thesisko.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = wesley.thesisko.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name wesley.thesisko.com;
    return 404; # managed by Certbot


}
