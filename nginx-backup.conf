server {
    server_name wesley.thesisko.com;

    location / {
        root /home/jarvis/blog/public;
        index index.html;
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wesley.thesisko.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wesley.thesisko.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = wesley.thesisko.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name wesley.thesisko.com;
    return 404; # managed by Certbot


}